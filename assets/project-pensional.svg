  <circle cx="82" cy="70" r="4" fill="#f2b95f" class="blink"/><text x="96" y="75" fill="#f2b95f" font-size="13" font-weight="700" letter-spacing="1.4">PROYECTO DESTACADO</text>
  <text x="64" y="146" fill="#eaf5f1" font-size="44" font-weight="760">AppPensional</text>
  <text x="64" y="187" fill="#91aaa2" font-size="20">Escenarios y cálculos para el contexto pensional colombiano.</text>
</g>
