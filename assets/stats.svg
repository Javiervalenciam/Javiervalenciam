<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0B132B"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Ring Gradients -->
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&amp;display=swap');

      .bg { fill: url(#bgGrad); }
      .title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 24px; fill: #F8FAFC; }
      
      .stat-card { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); stroke-width: 1px; rx: 16px; }
      .stat-value { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 48px; fill: #F8FAFC; }
      .stat-label { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px; fill: #94A3B8; text-transform: uppercase; letter-spacing: 1px; }
      
      .lang-bar { rx: 4px; }
      .lang-text { font-family: 'Fira Code', monospace; font-weight: 500; font-size: 13px; fill: #E2E8F0; }
      
      .progress { animation: fillBar 2s ease-out forwards; }
      @keyframes fillBar { from { width: 0; } }

      .glow-pulse { animation: pulse 4s infinite alternate; }
      @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
  </defs>

  <rect class="bg" width="1200" height="250" rx="24"/>

  <!-- Stats Grid -->
  <!-- Box 1: Contributions -->
  <g transform="translate(60, 40)">
    <rect width="320" height="170" class="stat-card"/>
    <text x="160" y="90" text-anchor="middle" class="stat-value">1,400+</text>
    <text x="160" y="125" text-anchor="middle" class="stat-label">Contributions in 2026</text>
    <circle cx="160" cy="80" r="60" fill="none" stroke="url(#ring1)" stroke-width="3" stroke-dasharray="10 10" opacity="0.3" class="glow-pulse"/>
  </g>

  <!-- Box 2: Grade/Repos -->
  <g transform="translate(420, 40)">
    <rect width="320" height="170" class="stat-card"/>
    <text x="160" y="90" text-anchor="middle" class="stat-value" fill="url(#ring2)">S</text>
    <text x="160" y="125" text-anchor="middle" class="stat-label">GitHub Rating</text>
    <text x="160" y="150" text-anchor="middle" style="font-family:'Outfit'; font-size:12px; fill:#64748B;">20+ Repositorios Activos</text>
    <circle cx="160" cy="75" r="45" fill="none" stroke="url(#ring2)" stroke-width="4" stroke-dasharray="200" stroke-dashoffset="50" class="progress"/>
  </g>

  <!-- Box 3: Top Languages -->
  <g transform="translate(780, 40)">
    <rect width="360" height="170" class="stat-card"/>
    <text x="30" y="40" class="title" style="font-size: 18px;">Top Languages</text>
    
    <!-- Python -->
    <text x="30" y="80" class="lang-text">Python</text>
    <rect x="120" y="70" width="200" height="8" class="lang-bar progress" fill="#3B82F6"/>
    
    <!-- TypeScript -->
    <text x="30" y="110" class="lang-text">TypeScript</text>
    <rect x="120" y="100" width="160" height="8" class="lang-bar progress" fill="#8B5CF6"/>
    
    <!-- Next.js/React -->
    <text x="30" y="140" class="lang-text">React/Next</text>
    <rect x="120" y="130" width="130" height="8" class="lang-bar progress" fill="#10B981"/>
  </g>
</svg>
