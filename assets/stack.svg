<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>

    <!-- Orbits Gradient -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.8"/>
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
      
      .bg { fill: url(#bgGrad); }
      .orbit { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 1.5px; }
      .orbit-active { fill: none; stroke: url(#orbitGrad); stroke-width: 2px; stroke-dasharray: 10 20; }
      
      .title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 42px; fill: #F8FAFC; }
      .subtitle { font-family: 'Outfit', sans-serif; font-weight: 400; font-size: 18px; fill: #94A3B8; }
      
      .node-bg { fill: #0F172A; stroke: rgba(255,255,255,0.1); stroke-width: 1px; rx: 12px; }
      .node-text { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px; fill: #E2E8F0; }
      
      /* Animations */
      .spin-slow { transform-origin: 600px 250px; animation: spin 40s linear infinite; }
      .spin-med { transform-origin: 600px 250px; animation: spin-reverse 30s linear infinite; }
      .spin-fast { transform-origin: 600px 250px; animation: spin 20s linear infinite; }
      
      /* Counter-rotate text so it stays upright */
      .counter-slow { transform-origin: center; animation: spin-reverse 40s linear infinite; }
      .counter-med { transform-origin: center; animation: spin 30s linear infinite; }
      .counter-fast { transform-origin: center; animation: spin-reverse 20s linear infinite; }
      
      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
      
      .center-pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    </style>
  </defs>

  <!-- Base -->
  <rect class="bg" width="1200" height="500" rx="24"/>
  
  <text x="60" y="60" class="title">Tech Stack</text>
  <text x="60" y="90" class="subtitle">Herramientas modernas para soluciones escalables (2026)</text>

  <!-- Central Core -->
  <g class="center-pulse" transform="translate(600, 250)">
    <circle cx="0" cy="0" r="40" fill="url(#orbitGrad)" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="#0F172A" stroke="url(#orbitGrad)" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="Outfit" font-weight="800" font-size="18" fill="#FFF">CORE</text>
  </g>

  <!-- Inner Orbit (Fast) -->
  <circle cx="600" cy="250" r="100" class="orbit"/>
  <circle cx="600" cy="250" r="100" class="orbit-active spin-fast"/>
  <g class="spin-fast">
    <!-- Node 1 -->
    <g transform="translate(600, 150)">
      <g class="counter-fast">
        <rect x="-50" y="-15" width="100" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">React</text>
      </g>
    </g>
    <!-- Node 2 -->
    <g transform="translate(600, 350)">
      <g class="counter-fast">
        <rect x="-50" y="-15" width="100" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">Python</text>
      </g>
    </g>
    <!-- Node 3 -->
    <g transform="translate(500, 250)">
      <g class="counter-fast">
        <rect x="-50" y="-15" width="100" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">Node.js</text>
      </g>
    </g>
  </g>

  <!-- Middle Orbit (Med) -->
  <circle cx="600" cy="250" r="170" class="orbit"/>
  <circle cx="600" cy="250" r="170" class="orbit-active spin-med" style="stroke-dasharray: 15 30"/>
  <g class="spin-med">
    <g transform="translate(745, 165)">
      <g class="counter-med">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">TypeScript</text>
      </g>
    </g>
    <g transform="translate(455, 335)">
      <g class="counter-med">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">Next.js</text>
      </g>
    </g>
    <g transform="translate(455, 165)">
      <g class="counter-med">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">Supabase</text>
      </g>
    </g>
    <g transform="translate(745, 335)">
      <g class="counter-med">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">TailwindCSS</text>
      </g>
    </g>
  </g>

  <!-- Outer Orbit (Slow) -->
  <circle cx="600" cy="250" r="240" class="orbit"/>
  <circle cx="600" cy="250" r="240" class="orbit-active spin-slow" style="stroke-dasharray: 20 40"/>
  <g class="spin-slow">
    <g transform="translate(600, 10)">
      <g class="counter-slow">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">Vercel</text>
      </g>
    </g>
    <g transform="translate(600, 490)">
      <g class="counter-slow">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">Cursor AI</text>
      </g>
    </g>
    <g transform="translate(840, 250)">
      <g class="counter-slow">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">Claude Code</text>
      </g>
    </g>
    <g transform="translate(360, 250)">
      <g class="counter-slow">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">GitHub Actions</text>
      </g>
    </g>
    <g transform="translate(770, 80)">
      <g class="counter-slow">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">Data Analysis</text>
      </g>
    </g>
    <g transform="translate(430, 420)">
      <g class="counter-slow">
        <rect x="-55" y="-15" width="110" height="30" class="node-bg"/>
        <text x="0" y="5" text-anchor="middle" class="node-text">Docker</text>
      </g>
    </g>
  </g>

</svg>