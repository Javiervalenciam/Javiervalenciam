<svg width="1200" height="450" viewBox="0 0 1200 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Animated Glowing Orbs -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');

      .bg-rect { fill: url(#bgGrad); }
      
      .title { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 72px; fill: url(#textGrad); letter-spacing: -2px; }
      .subtitle { font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 28px; fill: #E2E8F0; }
      .tagline { font-family: 'Fira Code', monospace; font-weight: 400; font-size: 16px; fill: #94A3B8; }
      
      .glass-card { fill: rgba(255, 255, 255, 0.03); stroke: rgba(255, 255, 255, 0.1); stroke-width: 1px; rx: 16px; backdrop-filter: blur(10px); }
      .glass-text { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px; fill: #F8FAFC; }
      
      .orb1 { animation: float1 12s ease-in-out infinite; }
      .orb2 { animation: float2 15s ease-in-out infinite; }
      .orb3 { animation: float3 10s ease-in-out infinite; }
      
      @keyframes float1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(30px, -40px) scale(1.1); }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-40px, 20px) scale(1.2); }
      }
      @keyframes float3 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(20px, 30px) scale(0.9); }
      }

      .line { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1px; stroke-dasharray: 4 4; }
      .grid-move { animation: slide 20s linear infinite; }
      @keyframes slide { from { transform: translateY(0); } to { transform: translateY(50px); } }
    </style>
    
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" class="line" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect class="bg-rect" width="1200" height="450" rx="24"/>
  
  <!-- Animated Grid -->
  <g opacity="0.4">
    <rect width="1200" height="500" fill="url(#grid)" class="grid-move" y="-50"/>
  </g>

  <!-- Glowing Orbs -->
  <circle cx="200" cy="100" r="150" fill="url(#glow1)" class="orb1"/>
  <circle cx="1000" cy="300" r="180" fill="url(#glow2)" class="orb2"/>
  <circle cx="600" cy="400" r="120" fill="url(#glow3)" class="orb3"/>

  <!-- Content -->
  <g transform="translate(600, 180)" text-anchor="middle">
    <text y="-50" class="tagline">&gt; const developer = "Javier Valencia";</text>
    <text y="20" class="title">Javier Valencia</text>
    <text y="70" class="subtitle">Software Builder &amp; Data Analyst</text>
    <text y="110" class="tagline">Pensiones · Negocios · Automatización · IA</text>
  </g>

  <!-- Floating Project Chips -->
  <g class="orb1" transform="translate(100, 250)">
    <rect class="glass-card" width="180" height="40" x="0" y="0"/>
    <text x="90" y="25" text-anchor="middle" class="glass-text">🚀 AppPensional</text>
  </g>
  
  <g class="orb3" transform="translate(900, 120)">
    <rect class="glass-card" width="200" height="40" x="0" y="0"/>
    <text x="100" y="25" text-anchor="middle" class="glass-text">📊 AppHistorias360</text>
  </g>
  
  <g class="orb2" transform="translate(250, 350)">
    <rect class="glass-card" width="160" height="40" x="0" y="0"/>
    <text x="80" y="25" text-anchor="middle" class="glass-text">⚡ Vercel Apps</text>
  </g>
  
  <g class="orb1" transform="translate(850, 320)">
    <rect class="glass-card" width="220" height="40" x="0" y="0"/>
    <text x="110" y="25" text-anchor="middle" class="glass-text">🏢 SistemaPOS-Heladeria</text>
  </g>

</svg>