<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.5" stop-color="#0C1630"/>
      <stop offset="1" stop-color="#101A2E"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="260" y1="120" x2="940" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C9CFF"/>
      <stop offset="0.5" stop-color="#B58CFF"/>
      <stop offset="1" stop-color="#FFB38A"/>
    </linearGradient>

    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 210) rotate(90) scale(140)">
      <stop stop-color="#7C9CFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C9CFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur" x="-200" y="-200" width="1600" height="800" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.55 0 1 0 0 0.50 0 0 1 0 1 0 0 0 1 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .grid { stroke: rgba(255,255,255,0.07); stroke-width: 1; }
      .textSmall { font: 500 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: rgba(255,255,255,0.72); }
      .textLarge { font: 800 70px Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; letter-spacing: -2px; }
      .subtitle { font: 500 22px Inter, ui-sans-serif, system-ui, sans-serif; fill: rgba(255,255,255,0.78); }
      .label { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: rgba(255,255,255,0.82); }
      .chip { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.14); stroke-width: 1; }
      .chipText { font: 700 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: white; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>

  <g opacity="0.7">
    <path d="M80 70H1120M80 140H1120M80 210H1120M80 280H1120M80 350H1120" class="grid"/>
    <path d="M120 40V380M240 40V380M360 40V380M480 40V380M600 40V380M720 40V380M840 40V380M960 40V380M1080 40V380" class="grid"/>
  </g>

  <circle cx="600" cy="210" r="145" fill="url(#orb)" filter="url(#blur)">
    <animate attributeName="r" values="130;150;130" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="600" cy="210" r="104" fill="none" stroke="rgba(124,156,255,0.22)" stroke-dasharray="4 10">
    <animateTransform attributeName="transform" type="rotate" from="0 600 210" to="360 600 210" dur="30s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="210" r="150" fill="none" stroke="rgba(181,140,255,0.13)" stroke-dasharray="1 14">
    <animateTransform attributeName="transform" type="rotate" from="360 600 210" to="0 600 210" dur="42s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#softGlow)">
    <text x="600" y="155" text-anchor="middle" class="textSmall">$ whoami</text>
    <text x="600" y="230" text-anchor="middle" class="textLarge" fill="url(#titleGrad)">Javier Valencia</text>
    <text x="600" y="268" text-anchor="middle" class="subtitle">Software para pensiones, negocios y analítica real</text>
  </g>

  <g>
    <circle cx="210" cy="95" r="3" fill="#7C9CFF">
      <animate attributeName="cy" values="90;100;90" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="120" r="3" fill="#FFB38A">
      <animate attributeName="cy" values="118;128;118" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="320" r="3" fill="#B58CFF">
      <animate attributeName="cy" values="314;324;314" dur="4.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="310" r="3" fill="#7C9CFF">
      <animate attributeName="cy" values="304;314;304" dur="5.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(430 320)">
    <rect x="0" y="0" width="120" height="32" rx="16" class="chip"/>
    <text x="60" y="21" text-anchor="middle" class="chipText">AppPensional</text>
  </g>
  <g transform="translate(565 320)">
    <rect x="0" y="0" width="150" height="32" rx="16" class="chip"/>
    <text x="75" y="21" text-anchor="middle" class="chipText">AppHistorias360</text>
  </g>
  <g transform="translate(730 320)">
    <rect x="0" y="0" width="150" height="32" rx="16" class="chip"/>
    <text x="75" y="21" text-anchor="middle" class="chipText">AppIndemnizaciones</text>
  </g>
</svg>