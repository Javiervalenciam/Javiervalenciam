  <circle cx="82" cy="70" r="4" fill="#46d7a1" class="blink"/><text x="96" y="75" fill="#46d7a1" font-size="13" font-weight="700" letter-spacing="1.4">PROYECTO DESTACADO</text>
  <text x="64" y="146" fill="#eaf5f1" font-size="44" font-weight="760">Productos web en producción</text>
  <text x="64" y="187" fill="#91aaa2" font-size="20">Finanzas, gastronomía, cupones QR y experiencias de negocio.</text>
</g>
