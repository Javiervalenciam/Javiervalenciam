<svg width="1200" height="650" viewBox="0 0 1200 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#050A15"/>
    </linearGradient>

    <!-- Card Backgrounds -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Accents -->
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;display=swap');
      
      .bg { fill: url(#bgGrad); }
      .title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 38px; fill: #F8FAFC; }
      .subtitle { font-family: 'Outfit', sans-serif; font-weight: 400; font-size: 16px; fill: #94A3B8; }
      
      .card { fill: url(#cardGrad); stroke: rgba(255,255,255,0.05); stroke-width: 1px; rx: 16px; }
      .card-glow { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 1px; rx: 16px; opacity: 0; transition: opacity 0.3s ease; }
      .card-hover:hover .card-glow { opacity: 1; }
      .card-hover:hover .card { stroke: rgba(255,255,255,0.15); }
      
      .card-title { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 22px; fill: #F1F5F9; }
      .card-desc { font-family: 'Outfit', sans-serif; font-weight: 400; font-size: 14px; fill: #94A3B8; }
      
      .badge { fill: rgba(255,255,255,0.05); rx: 12px; }
      .badge-text { font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 12px; fill: #CBD5E1; }
      
      .shimmer { animation: shimmer 4s infinite linear; }
      @keyframes shimmer {
        0% { opacity: 0.5; }
        50% { opacity: 1; }
        100% { opacity: 0.5; }
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="650" rx="24"/>
  
  <text x="60" y="60" class="title">Proyectos Destacados</text>
  <text x="60" y="90" class="subtitle">Sistemas core alojados localmente y aplicaciones web desplegadas en Vercel</text>

  <!-- Card 1: AppPensional -->
  <g class="card-hover" transform="translate(60, 140)">
    <rect width="340" height="200" class="card"/>
    <rect width="340" height="200" class="card-glow"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="url(#accent1)" opacity="0.15"/>
    <rect x="30" y="30" width="20" height="20" fill="url(#accent1)" rx="4"/>
    <text x="20" y="90" class="card-title">AppPensional</text>
    <text x="20" y="115" class="card-desc">Calculadora y sistema pensional</text>
    <text x="20" y="135" class="card-desc">colombiano. Core de negocio local.</text>
    <rect x="20" y="160" width="70" height="24" class="badge"/>
    <text x="55" y="176" text-anchor="middle" class="badge-text">Python</text>
    <rect x="95" y="160" width="70" height="24" class="badge"/>
    <text x="130" y="176" text-anchor="middle" class="badge-text">Local</text>
  </g>

  <!-- Card 2: AppHistorias360 -->
  <g class="card-hover" transform="translate(430, 140)">
    <rect width="340" height="200" class="card"/>
    <rect width="340" height="200" class="card-glow"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="url(#accent2)" opacity="0.15"/>
    <circle cx="40" cy="40" r="10" fill="url(#accent2)"/>
    <text x="20" y="90" class="card-title">AppHistorias360</text>
    <text x="20" y="115" class="card-desc">Auditoría profesional de historias</text>
    <text x="20" y="135" class="card-desc">laborales y extracción de PDFs.</text>
    <rect x="20" y="160" width="70" height="24" class="badge"/>
    <text x="55" y="176" text-anchor="middle" class="badge-text">Python</text>
    <rect x="95" y="160" width="90" height="24" class="badge"/>
    <text x="140" y="176" text-anchor="middle" class="badge-text">PDF Parser</text>
  </g>

  <!-- Card 3: AppIndemnizaciones -->
  <g class="card-hover" transform="translate(800, 140)">
    <rect width="340" height="200" class="card"/>
    <rect width="340" height="200" class="card-glow"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="url(#accent3)" opacity="0.15"/>
    <path d="M30 45 L40 35 L50 45 L50 30 Z" fill="url(#accent3)"/>
    <text x="20" y="90" class="card-title">AppIndemnizaciones</text>
    <text x="20" y="115" class="card-desc">Análisis avanzado y cálculo</text>
    <text x="20" y="135" class="card-desc">preciso de indemnizaciones laborales.</text>
    <rect x="20" y="160" width="70" height="24" class="badge"/>
    <text x="55" y="176" text-anchor="middle" class="badge-text">Python</text>
    <rect x="95" y="160" width="80" height="24" class="badge"/>
    <text x="135" y="176" text-anchor="middle" class="badge-text">Finanzas</text>
  </g>

  <!-- Card 4: SistemaPOS-Heladeria -->
  <g class="card-hover" transform="translate(60, 370)">
    <rect width="340" height="200" class="card"/>
    <rect width="340" height="200" class="card-glow"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="url(#accent4)" opacity="0.15"/>
    <rect x="30" y="35" width="20" height="15" fill="url(#accent4)" rx="2"/>
    <circle cx="40" cy="30" r="5" fill="url(#accent4)"/>
    <text x="20" y="90" class="card-title">Sistema POS</text>
    <text x="20" y="115" class="card-desc">Sistema de facturación e inventario</text>
    <text x="20" y="135" class="card-desc">diseñado para Heladerías.</text>
    <rect x="20" y="160" width="80" height="24" class="badge"/>
    <text x="60" y="176" text-anchor="middle" class="badge-text">Fullstack</text>
    <rect x="105" y="160" width="70" height="24" class="badge"/>
    <text x="140" y="176" text-anchor="middle" class="badge-text">Local</text>
  </g>

  <!-- Card 5: Vercel Web Apps -->
  <g class="card-hover" transform="translate(430, 370)">
    <rect width="340" height="200" class="card"/>
    <rect width="340" height="200" class="card-glow"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="url(#accent1)" opacity="0.15"/>
    <path d="M30 40 L40 30 L50 40" stroke="url(#accent1)" stroke-width="3" fill="none"/>
    <text x="20" y="90" class="card-title">Vercel Web Apps</text>
    <text x="20" y="115" class="card-desc">Colección de apps: Jacky China,</text>
    <text x="20" y="135" class="card-desc">Dashboard NS, Restaurante Gavan.</text>
    <rect x="20" y="160" width="70" height="24" class="badge"/>
    <text x="55" y="176" text-anchor="middle" class="badge-text">React</text>
    <rect x="95" y="160" width="70" height="24" class="badge"/>
    <text x="130" y="176" text-anchor="middle" class="badge-text">Vercel</text>
  </g>

  <!-- Card 6: Finanzas & Cupones -->
  <g class="card-hover" transform="translate(800, 370)">
    <rect width="340" height="200" class="card"/>
    <rect width="340" height="200" class="card-glow"/>
    <rect x="20" y="20" width="40" height="40" rx="8" fill="url(#accent3)" opacity="0.15"/>
    <circle cx="35" cy="40" r="5" fill="url(#accent3)"/>
    <circle cx="45" cy="30" r="5" fill="url(#accent3)"/>
    <text x="20" y="90" class="card-title">Finanzas &amp; Marketing</text>
    <text x="20" y="115" class="card-desc">Panel financiero (finanzas-javiervalencia)</text>
    <text x="20" y="135" class="card-desc">y sistema promo (dulce-cupones).</text>
    <rect x="20" y="160" width="70" height="24" class="badge"/>
    <text x="55" y="176" text-anchor="middle" class="badge-text">Next.js</text>
    <rect x="95" y="160" width="80" height="24" class="badge"/>
    <text x="135" y="176" text-anchor="middle" class="badge-text">Frontend</text>
  </g>

</svg>
