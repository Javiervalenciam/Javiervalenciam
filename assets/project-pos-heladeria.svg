<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
<title id="title">Sistema POS · Heladería</title><desc id="desc">Ventas, productos y operación diaria desde una interfaz de caja.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08110f"/><stop offset="1" stop-color="#0b1917"/></linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2bb7b0"/><stop offset="1" stop-color="#2bb7b0"/></linearGradient>
  <radialGradient id="glow"><stop stop-color="#2bb7b0" stop-opacity=".24"/><stop offset="1" stop-color="#2bb7b0" stop-opacity="0"/></radialGradient>
  <filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
</defs>
<style>
  .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .trace{stroke-dasharray:8 10;animation:flow 9s linear infinite} .rise{animation:rise 5s ease-in-out infinite} .pulse{transform-box:fill-box;transform-origin:center;animation:pulse 3.4s ease-in-out infinite} .blink{animation:blink 2.6s ease-in-out infinite}
  @keyframes flow{to{stroke-dashoffset:-180}} @keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}} @keyframes pulse{0%,100%{opacity:.55;transform:scale(.96)}50%{opacity:1;transform:scale(1.04)}} @keyframes blink{0%,100%{opacity:.45}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.trace,.rise,.pulse,.blink{animation:none!important}}
</style>
