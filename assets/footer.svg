<svg width="1200" height="150" viewBox="0 0 1200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0B132B"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
      
      .bg { fill: url(#bgGrad); }
      .text-main { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 22px; fill: #F8FAFC; }
      .text-sub { font-family: 'Outfit', sans-serif; font-weight: 400; font-size: 15px; fill: #94A3B8; }
      
      .btn { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.1); stroke-width: 1px; rx: 20px; transition: all 0.3s ease; }
      .btn-text { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px; fill: #E2E8F0; }
      
      .pulse-dot { animation: pulse 2s infinite; }
      @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      
      .separator { stroke: rgba(255,255,255,0.1); stroke-width: 1px; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="150" rx="24"/>
  
  <path d="M 100 0 L 1100 0" class="separator"/>

  <!-- Message -->
  <g transform="translate(100, 75)">
    <circle cx="0" cy="-5" r="6" fill="url(#accent)" class="pulse-dot"/>
    <text x="20" y="0" class="text-main">Available for new opportunities</text>
    <text x="20" y="25" class="text-sub">Construyendo software útil, elegante y listo para producción.</text>
  </g>

  <!-- Links Buttons (Visual) -->
  <g transform="translate(700, 55)">
    <!-- Portfolio -->
    <rect x="0" y="0" width="140" height="40" class="btn"/>
    <text x="70" y="25" text-anchor="middle" class="btn-text">🌐 javiervalencia.pro</text>
    
    <!-- LinkedIn/GH -->
    <rect x="155" y="0" width="120" height="40" class="btn"/>
    <text x="215" y="25" text-anchor="middle" class="btn-text">💼 LinkedIn</text>
    
    <rect x="290" y="0" width="100" height="40" class="btn"/>
    <text x="340" y="25" text-anchor="middle" class="btn-text">⭐ GitHub</text>
  </g>

</svg>